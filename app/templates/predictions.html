<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicciones StockWise AI - {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
</head>
<body>
    <!-- Navbar unificada -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">📊 INTELLIBUSINESS</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Inicio</a>
                <a class="nav-link" href="/reports">Reportes</a>
                <a class="nav-link active" href="/predictions">Predicciones StockWise AI</a>
                <a class="nav-link" href="/settings">Ajustes</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row g-4">

            <!-- Panel Lateral -->
            <div class="col-md-4">
                <div class="card p-4 h-100 border-0 shadow-sm">
                    <h5 class="fw-bold mb-4"><i class="bi bi-cpu text-primary me-2"></i>Análisis de Stock</h5>
                    
                    <select id="productSelect" class="form-select form-select-lg mb-4" onchange="loadData()">
                        {% for p in products %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                        {% endfor %}
                    </select>

                    <div class="prediction-box text-center shadow-sm mb-4">
                        <div class="prediction-label" id="predictionLabel">Venta Estimada (Mañana)</div>
                        <div id="predValue" class="prediction-value">--</div>
                        
                        <div class="btn-group w-100 mt-3" role="group">
                            <input type="radio" class="btn-check" name="horizon" id="h24" value="1" checked onchange="updateView()">
                            <label class="btn btn-outline-primary" for="h24">24h</label>
                            <input type="radio" class="btn-check" name="horizon" id="h30" value="30" onchange="updateView()">
                            <label class="btn btn-outline-primary" for="h30">30 Días</label>
                        </div>
                    </div>

                    <!-- Asistente de Inventario -->
                    <div id="inventoryStatusCard" class="d-none">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted small">Stock en almacén:</span>
                            <span id="stockCurrent" class="fw-bold">--</span>
                        </div>
                        <div class="progress mb-3" style="height: 8px;">
                            <div id="stockBar" class="progress-bar"></div>
                        </div>
                        <div id="statusBadge" class="status-badge text-center text-white mb-3">--</div>
                        <div class="recommendation-box" id="recommendationBox">
                            <small class="d-block text-muted">Sugerencia:</small>
                            <strong id="buyValue">-- unidades</strong>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel de Gráfica -->
            <div class="col-md-8">
                <div class="card p-4 h-100 border-0 shadow-sm">
                    <h5 class="fw-bold mb-4"><i class="bi bi-graph-up-arrow text-primary me-2"></i>Proyección de Demanda</h5>
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart
        let globalData
    
        async function loadData() {
            const productId = document.getElementById('productSelect').value
            try {
                const response = await fetch(`/api/chart-data/${productId}`)
                if (!response.ok) throw new Error("Error en la API")
    
                globalData = await response.json()
                updateView()
            } catch (error) {
                console.error("❌ Error cargando datos:", error)

                document.getElementById('predValue').innerText = "ERR"
            }
        }
    
        function updateView() {
            if (!globalData || !globalData.history || !globalData.forecast) return
    
            const horizon = document.querySelector('input[name="horizon"]:checked').value
            const ctx = document.getElementById('salesChart').getContext('2d')
    
            const inv = globalData.inventory
            const stats = (horizon === "1") ? inv.day : inv.month
    
            document.getElementById('inventoryStatusCard').classList.remove('d-none')
            document.getElementById('stockCurrent').innerText = inv.current + " uds"
            document.getElementById('buyValue').innerText = stats.recommendation + " uds"
            document.getElementById('statusBadge').innerText = stats.status
            document.getElementById('statusBadge').className = `status-badge text-center text-white bg-${stats.color}`
    
            const stockBar = document.getElementById('stockBar')
            const percent = Math.min(100, (inv.current / stats.demand) * 100)
            stockBar.style.width = percent + "%"
            stockBar.className = `progress-bar bg-${stats.color}`
    
            const historyLabels = globalData.history.map(h => h.date)
            const historyValues = globalData.history.map(h => h.value)
    
            let labels, forecastValues, displayPred
    
            if (horizon === "1") {
                const tomorrow = globalData.forecast[0]
                labels = [...historyLabels, tomorrow.date]
                forecastValues = [...Array(historyValues.length - 1).fill(null), historyValues[historyValues.length - 1], tomorrow.value]
                
                displayPred = tomorrow.value
                document.getElementById('predictionLabel').innerText = "Venta Estimada (Mañana)"
            } else {
                labels = [...historyLabels, ...globalData.forecast.map(f => f.date)]
                forecastValues = [...Array(historyValues.length - 1).fill(null), historyValues[historyValues.length - 1], ...globalData.forecast.map(f => f.value)]
                displayPred = globalData.forecast.reduce((a, b) => a + b.value, 0).toFixed(0)
                document.getElementById('predictionLabel').innerText = "Demanda Total Mes"
            }
    
            document.getElementById('predValue').innerText = displayPred
    
            if (myChart) myChart.destroy()
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Real', data: historyValues, borderColor: '#306bac', backgroundColor: 'rgba(48, 107, 172, 0.1)', fill: true, tension: 0.4 },
                        { label: 'IA', data: forecastValues, borderColor: '#918ef4', borderDash: [5, 5], pointRadius: horizon === "1" ? 7 : 2, tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
        window.onload = loadData;
    </script>
</body>
</html>
