<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>{{ app_name }} - Home</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">
    </head>

    <body>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">📊 INTELLIBUSINESS</a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="/">Inicio</a>
                    <a class="nav-link" href="/reports">Reportes</a>
                    <a class="nav-link" href="/predictions">Predicciones StockWise AI</a>
                    <a class="nav-link" href="/settings">Ajustes</a>
                </div>
            </div>
        </nav>

        <header class="hero text-center">
            <div class="container">
                <h1 class="display-4 fw-bold">Bienvenido a la Suite Inteligente</h1>
                <p class="lead">Automatización y Predicción en una sola plataforma</p>
            </div>
        </header>

        <main class="container mt-4">
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card p-4 text-center">
                        <i class="bi bi-box-seam display-4 text-primary"></i>
                        <h3 class="mt-2">{{ products_count }}</h3>
                        <p class="text-muted">Prodictos en el catálogo</p>
                        <a href="/predictions" class="btn btn-tech w-100">Ver Stock Inteligente</a>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card p-4 text-center">
                        <i class="bi bi-cart-check display-4 text-success"></i>
                        <h3 class="mt-2">{{ sales_count }}</h3>
                        <p class="text-muted">Ventas Registradas</p>
                        <a href="/reports" class="btn btn-outline-primery w-100">Gestionar Reportes</a>
                    </div>
                </div>
            </div>
        </main>

    </body>
</html>
